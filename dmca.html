document.addEventListener("click", function(e){
  const btn = e.target.closest(".btn_fullscreen");
  if(!btn) return;

  const container = btn.closest(".game-container");
  if(!container) return;

  const iframe = container.querySelector(".game-iframe");
  if(!iframe) return;

  const target = iframe;

  try {
    if (!document.fullscreenElement) {
      if (target.requestFullscreen) target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
      else if (target.msRequestFullscreen) target.msRequestFullscreen();

      document.body.classList.add("game-fullscreen-active");
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.msExitFullscreen) document.msExitFullscreen();

      document.body.classList.remove("game-fullscreen-active");
    }
  } catch(err) {
    console.error("Fullscreen error:", err);
  }
});

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove("game-fullscreen-active");
  }
});
</script></body></html>
