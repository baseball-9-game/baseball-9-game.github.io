<script>
document.addEventListener("DOMContentLoaded", function () {
  const nav = document.getElementById("navbar-dropdown");
  const toggle = document.getElementById("toggle-navbar");
  const close = document.getElementById("close-navbar");
  const searchToggle = document.getElementById("toggle-search");
  const searchForm = document.getElementById("search-form");
  const searchInput = document.getElementById("search-input");
  const searchResults = document.getElementById("search-results");
  const searchBox = document.querySelector(".header-search");

  function openNav() {
    if (!nav) return;
    nav.classList.add("open-nav");
    nav.classList.remove("hidden");
    if (toggle) toggle.setAttribute("aria-expanded", "true");
  }

  function closeNav() {
    if (!nav) return;
    nav.classList.remove("open-nav");
    nav.classList.add("hidden");
    if (toggle) toggle.setAttribute("aria-expanded", "false");
  }

  if (toggle) {
    toggle.addEventListener("click", function (e) {
      e.preventDefault();
      if (nav && nav.classList.contains("open-nav")) closeNav();
      else openNav();
    });
  }

  if (close) {
    close.addEventListener("click", function (e) {
      e.preventDefault();
      closeNav();
    });
  }

  if (searchToggle && searchBox) {
    searchToggle.addEventListener("click", function (e) {
      e.preventDefault();
      searchBox.classList.toggle("hidden");
      searchBox.classList.toggle("open-search");
      if (searchInput) searchInput.focus();
    });
  }

  let games = [];
  try {
    const el = document.getElementById("cms-search-data");
    games = el ? JSON.parse(el.textContent || "[]") : [];
  } catch (e) { games = []; }

  function escapeHtml(text) {
    return String(text || "").replace(/[&<>"']/g, function (m) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[m];
    });
  }

  function renderSearchResults(keyword) {
    if (!searchResults) return;
    const q = String(keyword || "").trim().toLowerCase();
    if (!q) {
      searchResults.style.display = "none";
      searchResults.innerHTML = "";
      return;
    }

    const rows = games
      .filter(g => String(g.title || "").toLowerCase().includes(q) || String(g.slug || "").toLowerCase().includes(q))
      .slice(0, 12);

    if (!rows.length) {
      searchResults.style.display = "block";
      searchResults.innerHTML = '<div class="search-empty">No games found</div>';
      return;
    }

    searchResults.style.display = "block";
    searchResults.innerHTML = rows.map(function (g) {
      const img = g.thumbnail ? '<img src="' + escapeHtml(g.thumbnail) + '" alt="' + escapeHtml(g.title) + '">' : '';
      return '<a class="search-result-item" href="/' + escapeHtml(g.slug) + '.html">' + img + '<span>' + escapeHtml(g.title) + '</span></a>';
    }).join("");
  }

  if (searchInput) {
    searchInput.addEventListener("input", function () {
      renderSearchResults(searchInput.value);
    });
  }

  if (searchForm) {
    searchForm.addEventListener("submit", function (e) {
      e.preventDefault();
      const q = searchInput ? searchInput.value.trim().toLowerCase() : "";
      if (!q) return;
      const exact = games.find(g => String(g.title || "").toLowerCase() === q || String(g.slug || "").toLowerCase() === q);
      const first = exact || games.find(g => String(g.title || "").toLowerCase().includes(q) || String(g.slug || "").toLowerCase().includes(q));
      if (first) window.location.href = "/" + first.slug + ".html";
    });
  }

  document.addEventListener("click", function (e) {
    if (!searchResults || !searchBox) return;
    if (!searchBox.contains(e.target) && e.target !== searchToggle) {
      searchResults.style.display = "none";
    }
  });
});
